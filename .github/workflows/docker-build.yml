name: Docker Compose Build Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build and validate Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all services
        # --no-cache: builds desde cero, sin reutilizar layers cacheados.
        # Garantiza reproducibilidad y evita falsos positivos por caché desactualizado.
        run: docker compose build --no-cache

      - name: Show logs if build failed
        # Solo se ejecuta si el paso anterior falló.
        # Sin esto, en CI no hay forma de saber por qué falló el build.
        if: failure()
        run: docker compose logs

      - name: Tear down containers and volumes
        # Se ejecuta siempre (éxito o fallo) para liberar recursos del runner
        # y evitar que artefactos de un run contaminen el siguiente.
        if: always()
        run: docker compose down -v
